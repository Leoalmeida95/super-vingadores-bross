<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hulk Game</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1b2a49;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }

    .game-page {
      width: min(94vw, 980px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .game-title {
      margin: 0;
      font-size: clamp(32px, 5vw, 46px);
      color: #00ff66;
      letter-spacing: 1px;
      text-align: center;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    #game-container {
      width: 100%;
      display: flex;
      justify-content: center;
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      background: #0f1d34;
    }

    #game-container canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>

<div class="game-page">
  <h1 class="game-title">Super Hulk Bross</h1>
  <div id="game-container"></div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
