<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hulk Game</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
</head>
<body>

<script>
const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 600,
  backgroundColor: '#222',
  physics: {
    default: 'arcade',
    arcade: {
      gravity: { y: 600 },
      debug: true
    }
  },
  scene: {
    preload,
    create,
    update
  }
};

const WORLD_WIDTH = 3000;
const WORLD_HEIGHT = 600;

let player;
let cursors;
let enemies;
let keyX;
let attackHitbox;
let canAttack = true;
let isAttacking = false;
let facing = 'right';
let playerLives = 3;
let isInvulnerable = false;
let isGameOver = false;
let livesText;
let coins;
let score = 0;
let scoreText;
let boss;
let bossHealth = 5;
let bossText;
let bossCanTakeHit = true;
let bossSpawned = false;
let bossParts = {};

new Phaser.Game(config);

function preload() {
  // Sprite sheet do Hulk (ajuste frameWidth/frameHeight depois, se precisar)
  this.load.spritesheet('hulk', 'assets/hulk.png', {
    frameWidth: 128,
    frameHeight: 128
  });
}

function create() {
  // Fundo da cidade (camadas simples com profundidade)
  createCityBackground(this, WORLD_WIDTH);

  // Limites do mundo (nível mais largo)
  this.physics.world.setBounds(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
  this.cameras.main.setBounds(0, 0, WORLD_WIDTH, WORLD_HEIGHT);

  // chão (verde)
  const ground = this.add.rectangle(WORLD_WIDTH / 2, 580, WORLD_WIDTH, 40, 0x00ff00);
  this.physics.add.existing(ground, true);

  // Player com sprite (mantém física e colisões)
  player = this.physics.add.sprite(100, 450, 'hulk', 0);

  player.body.setCollideWorldBounds(true);

  // Câmera segue o jogador de forma suave
  this.cameras.main.startFollow(player, true, 0.08, 0.08);

  // Animações básicas do player (ajuste os ranges depois conforme seu sprite sheet)
  this.anims.create({
    key: 'idle',
    frames: this.anims.generateFrameNumbers('hulk', { start: 0, end: 3 }),
    frameRate: 6,
    repeat: -1
  });

  this.anims.create({
    key: 'run',
    frames: this.anims.generateFrameNumbers('hulk', { start: 4, end: 11 }),
    frameRate: 12,
    repeat: -1
  });

  this.anims.create({
    key: 'jump',
    frames: this.anims.generateFrameNumbers('hulk', { start: 12, end: 15 }),
    frameRate: 10,
    repeat: -1
  });

  this.anims.create({
    key: 'attack',
    frames: this.anims.generateFrameNumbers('hulk', { start: 16, end: 21 }),
    frameRate: 16,
    repeat: 0
  });

  // Começa parado no idle
  player.anims.play('idle');

  this.physics.add.collider(player, ground);

  // Inimigos simples (retângulos) em um grupo
  enemies = this.physics.add.group();

  // Cria vários inimigos com limites de patrulha (minX e maxX)
  createEnemy(this, 300, 520, 220, 420);
  createEnemy(this, 520, 520, 460, 700);
  createEnemy(this, 700, 520, 620, 780);

  // Inimigos colidem com o chão
  this.physics.add.collider(enemies, ground);

  // Colisão jogador x inimigos (dano apenas se não estiver atacando)
  this.physics.add.collider(player, enemies, (playerObj, enemy) => {
    if (isGameOver) return;
    if (!enemy || !enemy.active || enemy.isDying) return;

    // Stomp estilo Mario: caindo e acertando por cima
    const isFalling = playerObj.body.velocity.y > 0;
    const fromAbove = playerObj.body.bottom <= enemy.body.top + 12;
    if (isFalling && fromAbove) {
      destroyEnemyOnHit(this, enemy);
      playerObj.body.setVelocityY(-320); // pequeno pulo de retorno
      return;
    }

    if (attackHitbox && attackHitbox.body.enable) return;
    damagePlayer(this);
  });

  cursors = this.input.keyboard.createCursorKeys();

  // Tecla de ataque (X)
  keyX = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.X);

  // Hitbox do soco (fica invisível até o momento do ataque)
  attackHitbox = this.add.rectangle(-100, -100, 35, 25, 0xffff00, 0.35);
  this.physics.add.existing(attackHitbox);
  attackHitbox.body.setAllowGravity(false);
  attackHitbox.body.setImmovable(true);
  attackHitbox.body.setSize(42, 32);
  attackHitbox.body.enable = false;
  attackHitbox.setVisible(false);

  // Se a hitbox tocar um inimigo, o inimigo é destruído
  this.physics.add.overlap(attackHitbox, enemies, (hitbox, enemy) => {
    if (!hitbox.body.enable || !enemy || !enemy.active) return;
    destroyEnemyOnHit(this, enemy);
  });

  // Boss nasce depois que o player coleta 5 moedas
  boss = null;

  // Moedas (círculos amarelos) com física estática
  coins = this.physics.add.staticGroup();
  createCoin(this, 180, 520);
  createCoin(this, 260, 480);
  createCoin(this, 420, 520);
  createCoin(this, 560, 480);
  createCoin(this, 740, 520);

  // Coleta de moedas: some e soma +1 no score
  this.physics.add.overlap(player, coins, (playerObj, coin) => {
    if (!coin || !coin.active) return;

    score += 1;
    scoreText.setText('Moedas: ' + score);

    // Spawn do boss apenas uma vez quando atingir 5 moedas
    if (score >= 5 && !bossSpawned) {
      spawnBoss(this, ground);
    }

    // Feedback visual: brilho + texto + encolher rápido
    playCoinCollectEffect(this, coin.x, coin.y);

    this.tweens.add({
      targets: coin,
      scaleX: 0,
      scaleY: 0,
      duration: 80,
      onComplete: () => {
        coin.destroy();
      }
    });
  });

  // HUD simples para mostrar vidas
  livesText = this.add.text(20, 14, 'Vidas: ' + playerLives, {
    fontSize: '24px',
    color: '#ffffff'
  });

  // HUD do score de moedas
  scoreText = this.add.text(20, 44, 'Moedas: ' + score, {
    fontSize: '24px',
    color: '#ffff66'
  });

  // HUD da vida do boss
  bossText = this.add.text(20, 74, 'Boss: Locked', {
    fontSize: '24px',
    color: '#dd99ff'
  });

  // Fundo leve para melhorar leitura do HUD
  const hudBg = this.add.rectangle(140, 52, 250, 96, 0x000000, 0.32);
  hudBg.setOrigin(0, 0.5);
  hudBg.setDepth(-1);
}

function update() {
  if (isGameOver) {
    player.body.setVelocityX(0);
    return;
  }

  if (cursors.left.isDown) {
    player.body.setVelocityX(-200);
    facing = 'left';
    player.setFlipX(true);
  } else if (cursors.right.isDown) {
    player.body.setVelocityX(200);
    facing = 'right';
    player.setFlipX(false);
  } else {
    player.body.setVelocityX(0);
  }

  if (cursors.up.isDown && player.body.touching.down) {
    player.body.setVelocityY(-400);
  }

  // Executa ataque ao pressionar X (com cooldown)
  if (Phaser.Input.Keyboard.JustDown(keyX) && canAttack) {
    performAttack(this);
  }

  // Controle simples de animações baseado no estado atual
  const onGround = player.body.touching.down || player.body.blocked.down;
  const movingX = player.body.velocity.x !== 0;

  // Prioridade: attack > jump > run > idle
  if (isAttacking) {
    setPlayerAnimation('attack');
  } else if (!onGround) {
    setPlayerAnimation('jump');
  } else if (movingX) {
    setPlayerAnimation('run');
  } else {
    setPlayerAnimation('idle');
  }

  // Movimento automático esquerda/direita dos inimigos
  enemies.children.iterate((enemy) => {
    if (!enemy) return;

    // Inverte direção ao atingir os limites definidos
    if (enemy.x <= enemy.minX) {
      enemy.direction = 1;
    } else if (enemy.x >= enemy.maxX) {
      enemy.direction = -1;
    }

    enemy.body.setVelocityX(enemy.speed * enemy.direction);

    // Mantém o visual do inimigo alinhado ao corpo físico
    updateEnemyVisual(enemy);
  });

  // Movimento simples do boss (vai e volta devagar)
  if (boss && boss.active) {
    if (boss.x <= boss.minX) {
      boss.direction = 1;
    } else if (boss.x >= boss.maxX) {
      boss.direction = -1;
    }

    boss.body.setVelocityX(boss.speed * boss.direction);

    // Mantém o visual do boss alinhado ao corpo físico
    updateBossVisual();
  }

}

// Cria um soco curto na frente do jogador
function performAttack(scene) {
  canAttack = false;
  isAttacking = true;

  // Força animação de ataque no momento do soco
  setPlayerAnimation('attack');

  // Direção do soco: aparece na frente do player
  const offsetX = facing === 'right' ? 52 : -52;
  attackHitbox.setPosition(player.body.center.x + offsetX, player.body.center.y + 10);
  attackHitbox.setVisible(true);
  attackHitbox.body.enable = true;
  attackHitbox.body.updateFromGameObject();

  // Garante detecção imediata no mesmo frame do ataque
  scene.physics.overlap(attackHitbox, enemies, (hitbox, enemy) => {
    if (!hitbox.body.enable || !enemy || !enemy.active) return;
    destroyEnemyOnHit(scene, enemy);
  });

  // Hitbox some rapidamente
  scene.time.delayedCall(200, () => {
    attackHitbox.body.enable = false;
    attackHitbox.setVisible(false);
  });

  // Tempo de estado de ataque (visual + lógica)
  scene.time.delayedCall(220, () => {
    isAttacking = false;
  });

  // Cooldown para evitar spam
  scene.time.delayedCall(300, () => {
    canAttack = true;
  });
}

// Aplica dano no jogador com invencibilidade temporária
function damagePlayer(scene) {
  if (isInvulnerable || isGameOver) return;

  playerLives -= 1;
  livesText.setText('Vidas: ' + playerLives);

  // Feedback visual: muda cor + pisca por 1 segundo
  isInvulnerable = true;
  player.setTint(0xff6666);
  scene.tweens.add({
    targets: player,
    alpha: 0.3,
    duration: 100,
    yoyo: true,
    repeat: 5,
    onComplete: () => {
      player.alpha = 1;
      player.clearTint();
    }
  });

  if (playerLives <= 0) {
    isGameOver = true;
    scene.add.text(400, 300, 'Game Over', {
      fontSize: '48px',
      color: '#ffffff'
    }).setOrigin(0.5);

    // Reinicia a cena após um pequeno tempo
    scene.time.delayedCall(1500, () => {
      scene.scene.restart();
    });
    return;
  }

  scene.time.delayedCall(1000, () => {
    isInvulnerable = false;
  });
}

// Toca animação apenas quando necessário (evita troca/restart a cada frame)
function setPlayerAnimation(key) {
  if (!player || !player.anims) return;
  if (player.anims.currentAnim && player.anims.currentAnim.key === key) return;
  player.anims.play(key, true);
}

// Cria boss quando o jogador junta moedas suficientes
function spawnBoss(scene, ground) {
  if (bossSpawned) return;
  bossSpawned = true;

  bossHealth = 5;
  bossCanTakeHit = true;

  // Boss final no lado direito do mapa
  boss = scene.add.rectangle(WORLD_WIDTH - 120, 500, 70, 90, 0x8a2be2);
  scene.physics.add.existing(boss);
  boss.body.setCollideWorldBounds(true);
  boss.body.setImmovable(false);
  boss.minX = WORLD_WIDTH - 260;
  boss.maxX = WORLD_WIDTH - 80;
  boss.direction = -1;
  boss.speed = 45;

  // Mantém o corpo físico do boss, mas troca para um visual mais imponente
  boss.setVisible(false);
  createBossVisual(scene, boss);

  // Remove também as partes visuais quando o boss for destruído
  boss.on('destroy', () => {
    destroyBossVisual();
  });

  // Boss colide com o chão
  scene.physics.add.collider(boss, ground);

  // Boss causa dano ao encostar no jogador
  scene.physics.add.collider(player, boss, () => {
    if (!boss || !boss.active) return;
    damagePlayer(scene);
  });

  // Boss só toma dano da hitbox de ataque
  scene.physics.add.overlap(attackHitbox, boss, (hitbox, bossObj) => {
    if (!hitbox.body.enable || !bossObj.active || !bossCanTakeHit) return;

    bossCanTakeHit = false;
    bossHealth -= 1;
    bossText.setText('Boss: ' + bossHealth);

    // Feedback visual simples quando o boss toma dano
    setBossVisualColor(0xc77dff, 0x9d4edd);
    scene.time.delayedCall(100, () => {
      if (bossObj.active) {
        setBossVisualColor(0xb565f5, 0x7b2cbf);
      }
    });

    if (bossHealth <= 0) {
      bossObj.destroy();
      isGameOver = true;
      scene.add.text(400, 300, 'YOU WIN', {
        fontSize: '48px',
        color: '#ffffff'
      }).setOrigin(0.5);
      return;
    }

    // Evita múltiplos hits no mesmo ataque
    scene.time.delayedCall(220, () => {
      bossCanTakeHit = true;
    });
  });

  bossText.setText('Boss: ' + bossHealth);
}

// Cria visual do boss com várias formas roxas (mais imponente)
function createBossVisual(scene, bossObj) {
  bossParts.crown = scene.add.rectangle(bossObj.x, bossObj.y - 62, 60, 12, 0x3c096c);
  bossParts.head = scene.add.circle(bossObj.x, bossObj.y - 42, 18, 0xb565f5);
  bossParts.body = scene.add.rectangle(bossObj.x, bossObj.y + 6, 96, 88, 0x7b2cbf);
  bossParts.shoulderLeft = scene.add.circle(bossObj.x - 56, bossObj.y - 8, 16, 0x5a189a);
  bossParts.shoulderRight = scene.add.circle(bossObj.x + 56, bossObj.y - 8, 16, 0x5a189a);
  bossParts.eyeLeft = scene.add.circle(bossObj.x - 7, bossObj.y - 44, 3, 0xffffff);
  bossParts.eyeRight = scene.add.circle(bossObj.x + 7, bossObj.y - 44, 3, 0xffffff);

  updateBossVisual();
}

// Atualiza a posição das partes visuais do boss
function updateBossVisual() {
  if (!boss || !boss.active || !bossParts.body) return;

  bossParts.crown.setPosition(boss.x, boss.y - 62);
  bossParts.head.setPosition(boss.x, boss.y - 42);
  bossParts.body.setPosition(boss.x, boss.y + 6);
  bossParts.shoulderLeft.setPosition(boss.x - 56, boss.y - 8);
  bossParts.shoulderRight.setPosition(boss.x + 56, boss.y - 8);
  bossParts.eyeLeft.setPosition(boss.x - 7, boss.y - 44);
  bossParts.eyeRight.setPosition(boss.x + 7, boss.y - 44);
}

// Troca cor principal do boss para feedback visual
function setBossVisualColor(headColor, bodyColor) {
  if (!bossParts.body) return;
  bossParts.head.setFillStyle(headColor);
  bossParts.body.setFillStyle(bodyColor);
  bossParts.shoulderLeft.setFillStyle(0x5a189a);
  bossParts.shoulderRight.setFillStyle(0x5a189a);
}

// Remove as formas visuais do boss com segurança
function destroyBossVisual() {
  Object.keys(bossParts).forEach((key) => {
    if (bossParts[key]) {
      bossParts[key].destroy();
    }
  });
  bossParts = {};
}

// Função simples para criar um inimigo com patrulha horizontal
function createEnemy(scene, x, y, minX, maxX) {
  const enemy = scene.add.rectangle(x, y, 40, 40, 0xff3333);
  scene.physics.add.existing(enemy);

  // O retângulo físico fica invisível; o visual real é feito por múltiplas formas
  enemy.setVisible(false);

  enemy.body.setCollideWorldBounds(true);
  enemy.minX = minX;
  enemy.maxX = maxX;
  enemy.speed = 80;
  enemy.direction = 1;

  createEnemyVisual(scene, enemy);

  // Quando o inimigo morrer, remove também as partes visuais
  enemy.on('destroy', () => {
    if (!enemy.visualParts) return;
    enemy.visualParts.forEach((part) => part.destroy());
  });

  enemies.add(enemy);
}

// Cria um visual mais interessante para o inimigo (corpo + olhos + pés)
function createEnemyVisual(scene, enemy) {
  const body = scene.add.rectangle(enemy.x, enemy.y, 34, 28, 0xcc2222);
  const eyeLeft = scene.add.circle(enemy.x - 7, enemy.y - 3, 3, 0xffffff);
  const eyeRight = scene.add.circle(enemy.x + 7, enemy.y - 3, 3, 0xffffff);
  const pupilLeft = scene.add.circle(enemy.x - 7, enemy.y - 3, 1.3, 0x111111);
  const pupilRight = scene.add.circle(enemy.x + 7, enemy.y - 3, 1.3, 0x111111);
  const footLeft = scene.add.rectangle(enemy.x - 8, enemy.y + 15, 8, 5, 0x7a0f0f);
  const footRight = scene.add.rectangle(enemy.x + 8, enemy.y + 15, 8, 5, 0x7a0f0f);

  enemy.visualParts = [body, eyeLeft, eyeRight, pupilLeft, pupilRight, footLeft, footRight];

  updateEnemyVisual(enemy);
}

// Atualiza posição das partes visuais do inimigo de acordo com o corpo físico
function updateEnemyVisual(enemy) {
  if (!enemy.visualParts) return;

  const dir = enemy.direction || 1;
  const eyeOffsetX = 7 * dir;
  const pupilOffsetX = 7.8 * dir;

  enemy.visualParts[0].setPosition(enemy.x, enemy.y);
  enemy.visualParts[1].setPosition(enemy.x + eyeOffsetX, enemy.y - 3);
  enemy.visualParts[2].setPosition(enemy.x - eyeOffsetX, enemy.y - 3);
  enemy.visualParts[3].setPosition(enemy.x + pupilOffsetX, enemy.y - 3);
  enemy.visualParts[4].setPosition(enemy.x - pupilOffsetX, enemy.y - 3);
  enemy.visualParts[5].setPosition(enemy.x - 8, enemy.y + 15);
  enemy.visualParts[6].setPosition(enemy.x + 8, enemy.y + 15);
}

// Efeito leve ao coletar moeda (sem custo alto)
function playCoinCollectEffect(scene, x, y) {
  const sparkle = scene.add.circle(x, y, 6, 0xfff799, 0.8);
  const plusOne = scene.add.text(x, y - 8, '+1', {
    fontSize: '16px',
    color: '#ffe066'
  }).setOrigin(0.5);

  scene.tweens.add({
    targets: sparkle,
    scaleX: 2,
    scaleY: 2,
    alpha: 0,
    duration: 130,
    onComplete: () => sparkle.destroy()
  });

  scene.tweens.add({
    targets: plusOne,
    y: y - 28,
    alpha: 0,
    duration: 260,
    onComplete: () => plusOne.destroy()
  });
}

// Efeito leve ao acertar inimigo (flash + encolher)
function playEnemyHitEffect(scene, enemy, onComplete) {
  const effectTargets = enemy.visualParts && enemy.visualParts.length > 0
    ? enemy.visualParts
    : [enemy];

  effectTargets.forEach((part) => {
    if (part.setFillStyle) {
      part.setFillStyle(0xffe066);
    }
  });

  scene.tweens.add({
    targets: effectTargets,
    scaleX: 1.25,
    scaleY: 0.7,
    alpha: 0,
    duration: 120,
    onComplete: () => {
      if (onComplete) onComplete();
    }
  });
}

// Remove inimigo ao levar hit da hitbox de ataque
function destroyEnemyOnHit(scene, enemy) {
  // Evita hit duplo no mesmo inimigo durante o efeito
  if (enemy.isDying) return;
  enemy.isDying = true;

  if (enemy.body) {
    enemy.body.enable = false;
  }

  // Feedback visual rápido de impacto antes de remover
  playEnemyHitEffect(scene, enemy, () => {
    if (enemy.active) {
      enemy.destroy();
    }
  });
}

// Função simples para criar uma moeda
function createCoin(scene, x, y) {
  const coin = scene.add.circle(x, y, 10, 0xffdd33);
  scene.physics.add.existing(coin, true);

  // Corpo estático: moeda fica fixa (sem gravidade e sem movimento)
  coin.body.setImmovable(true);

  coins.add(coin);
}

// Cria um cenário de cidade leve, usando apenas formas
function createCityBackground(scene, sceneWidth = config.width) {
  const width = sceneWidth;
  const height = config.height;

  // Céu em duas faixas para dar profundidade
  const skyTop = scene.add.rectangle(width / 2, 150, width, 300, 0x1b2a49).setDepth(-30);
  const skyBottom = scene.add.rectangle(width / 2, 430, width, 340, 0x23395b).setDepth(-29);

  // Lua
  const moon = scene.add.circle(680, 90, 28, 0xf2f2c9).setDepth(-28);

  // Camada distante de prédios (mais escura)
  for (let x = 40; x <= width + 40; x += 90) {
    const h = Phaser.Math.Between(120, 220);
    scene.add.rectangle(x, 560 - h / 2, 70, h, 0x1a2238)
      .setDepth(-27)
      .setScrollFactor(0.9); // parallax leve
  }

  // Camada média de prédios (mais clara)
  for (let x = 25; x <= width + 25; x += 80) {
    const h = Phaser.Math.Between(90, 180);
    scene.add.rectangle(x, 560 - h / 2, 52, h, 0x2f3e63)
      .setDepth(-26)
      .setScrollFactor(0.95); // parallax leve
  }

  // Mantém referências para evitar aviso de variáveis não usadas
  skyTop.alpha = 1;
  skyBottom.alpha = 1;
  moon.alpha = 1;
}
</script>

</body>
</html>
