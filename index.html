<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hulk Game</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1b2a49;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }

    .game-page {
      width: min(94vw, 980px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .game-title {
      margin: 0;
      font-size: clamp(32px, 5vw, 46px);
      color: #00ff66;
      letter-spacing: 1px;
      text-align: center;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    #game-container {
      width: 100%;
      display: flex;
      justify-content: center;
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      background: #0f1d34;
    }

    #game-container canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>

<div class="game-page">
  <h1 class="game-title">Super Hulk Bross</h1>
  <div id="game-container"></div>
</div>

<script>
const config = {
  parent: 'game-container',
  type: Phaser.AUTO,
  width: 800,
  height: 600,
  backgroundColor: '#222',
  physics: {
    default: 'arcade',
    arcade: {
      gravity: { y: 600 },
      debug: true
    }
  },
  scene: {
    preload,
    create,
    update
  }
};

const WORLD_WIDTH = 3000;
const WORLD_HEIGHT = 600;
const CONTENT_SPAWN_STEP = 400;
const CONTENT_SPAWN_AHEAD = 500;

let player;
let cursors;
let enemies;
let keyX;
let attackHitbox;
let footHitbox;
let canAttack = true;
let isAttacking = false;
let facing = 'right';
let playerLives = 10;
let isInvulnerable = false;
let isGameOver = false;
let livesText;
let coins;
let score = 0;
let scoreText;
let boss;
let bossHealth = 5;
let bossText;
let bossCanTakeHit = true;
let bossSpawned = false;
let lastSpawnX = 0;
let coinSpawnKeys = new Set();
let bgMusic;
let musicStarted = false;
let stompLockUntil = 0;
let fireballs;
let bossLastShotTime = 0;
const BOSS_SHOT_COOLDOWN = 2000;
const BOSS_FIREBALL_SPEED = 260;

new Phaser.Game(config);

function preload() {
  // Sprite sheet do Hulk (ajuste frameWidth/frameHeight depois, se precisar)
  this.load.spritesheet('hulk', 'assets/hulk.png', {
    frameWidth: 128,
    frameHeight: 128
  });

  // Sprite sheet do boss (Thanos-like)
  this.load.spritesheet('thanos', 'assets/thanos.png', {
    frameWidth: 85,
    frameHeight: 92
  });

  // Sprite sheet dos inimigos (alien)
  this.load.spritesheet('enemy', 'assets/enemy.png', {
    frameWidth: 32,
    frameHeight: 40
  });

  // Musica de fundo
  this.load.audio('bg-music', 'assets/music.mp3');
}

function create() {
  // Reseta estado global ao iniciar/reiniciar a cena
  isGameOver = false;
  isInvulnerable = false;
  canAttack = true;
  isAttacking = false;
  facing = 'right';
  playerLives = 10;
  score = 0;
  bossHealth = 5;
  bossCanTakeHit = true;
  bossSpawned = false;
  boss = null;
  lastSpawnX = 400;
  coinSpawnKeys = new Set();
  bossLastShotTime = 0;

  // Fundo da cidade (camadas simples com profundidade)
  createCityBackground(this, WORLD_WIDTH);

  // Limites do mundo (nível mais largo)
  this.physics.world.setBounds(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
  this.cameras.main.setBounds(0, 0, WORLD_WIDTH, WORLD_HEIGHT);

  // chão (verde)
  const ground = this.add.rectangle(WORLD_WIDTH / 2, 580, WORLD_WIDTH, 40, 0x00ff00);
  this.physics.add.existing(ground, true);

  // Player com sprite (mantém física e colisões)
  player = this.physics.add.sprite(100, 450, 'hulk', 0);

  player.body.setCollideWorldBounds(true);

  // Foot hitbox para stomp (invisível, pequeno e sem gravidade)
  footHitbox = this.add.rectangle(player.x, player.y + (player.height / 2), 30, 10, 0x00ffff, 0);
  this.physics.add.existing(footHitbox);
  footHitbox.body.setAllowGravity(false);
  footHitbox.body.setImmovable(true);
  footHitbox.body.setSize(30, 10);
  footHitbox.setVisible(false);

  // Câmera segue o jogador de forma suave
  this.cameras.main.startFollow(player, true, 0.08, 0.08);

  // Animações básicas do player (ajuste os ranges depois conforme seu sprite sheet)
  this.anims.create({
    key: 'idle',
    frames: this.anims.generateFrameNumbers('hulk', { start: 0, end: 3 }),
    frameRate: 6,
    repeat: -1
  });

  this.anims.create({
    key: 'run',
    frames: this.anims.generateFrameNumbers('hulk', { start: 4, end: 11 }),
    frameRate: 12,
    repeat: -1
  });

  this.anims.create({
    key: 'jump',
    frames: this.anims.generateFrameNumbers('hulk', { start: 12, end: 15 }),
    frameRate: 10,
    repeat: -1
  });

  this.anims.create({
    key: 'attack',
    frames: this.anims.generateFrameNumbers('hulk', { start: 16, end: 21 }),
    frameRate: 16,
    repeat: 0
  });

  // Animações simples do boss
  if (!this.anims.exists('boss-idle')) {
    this.anims.create({
      key: 'boss-idle',
      frames: this.anims.generateFrameNumbers('thanos', { start: 0, end: 3 }),
      frameRate: 5,
      repeat: -1
    });
  }

  if (!this.anims.exists('boss-attack')) {
    this.anims.create({
      key: 'boss-attack',
      frames: this.anims.generateFrameNumbers('thanos', { start: 4, end: 7 }),
      frameRate: 8,
      repeat: 0
    });
  }

  // Animações simples dos inimigos
  if (this.textures.exists('enemy')) {
    if (!this.anims.exists('enemy-idle')) {
      this.anims.create({
        key: 'enemy-idle',
        frames: this.anims.generateFrameNumbers('enemy', { start: 0, end: 1 }),
        frameRate: 4,
        repeat: -1
      });
    }

    if (!this.anims.exists('enemy-walk')) {
      this.anims.create({
        key: 'enemy-walk',
        frames: this.anims.generateFrameNumbers('enemy', { start: 2, end: 7 }),
        frameRate: 10,
        repeat: -1
      });
    }

    if (!this.anims.exists('enemy-attack')) {
      this.anims.create({
        key: 'enemy-attack',
        frames: this.anims.generateFrameNumbers('enemy', { start: 8, end: 11 }),
        frameRate: 8,
        repeat: 0
      });
    }
  }

  // Começa parado no idle
  player.anims.play('idle');

  this.physics.add.collider(player, ground);

  // Inimigos simples (retângulos) em um grupo
  enemies = this.physics.add.group();

  // Cria vários inimigos com limites de patrulha (minX e maxX)
  createEnemy(this, 300, 520, 220, 420);
  createEnemy(this, 520, 520, 460, 700);
  createEnemy(this, 700, 520, 620, 780);

  // Inimigos colidem com o chão
  this.physics.add.collider(enemies, ground);

  // Grupo de projéteis do boss (sem gravidade)
  fireballs = this.physics.add.group({
    classType: Phaser.Physics.Arcade.Image,
    allowGravity: false,
    immovable: false,
    maxSize: 40
  });

  // Textura simples da fireball (laranja/vermelho)
  if (!this.textures.exists('fireball')) {
    const g = this.make.graphics({ x: 0, y: 0, add: false });
    g.fillStyle(0xff5a1f, 1);
    g.fillCircle(8, 8, 8);
    g.lineStyle(2, 0xffc14d, 1);
    g.strokeCircle(8, 8, 7);
    g.generateTexture('fireball', 16, 16);
    g.destroy();
  }

    // Colisão principal player x inimigo com prioridade de stomp
    this.physics.add.collider(player, enemies, (playerObj, enemy) => {
      if (!enemy || !enemy.active || enemy.isDying) return;
      if (attackHitbox && attackHitbox.body.enable) return;

      const isFalling = playerObj.body.velocity.y > 50;
      const stompBySensor = this.physics.overlap(footHitbox, enemy);

      // Regra mais confiável para stomp:
      // - jogador está caindo
      // - corpo do jogador está acima do centro do inimigo
      // - borda inferior está dentro de uma tolerância ampla sobre o topo
      const aboveEnemyCenter = playerObj.body.center.y < enemy.body.center.y;
      const topTolerance = playerObj.body.bottom <= enemy.body.top + 40;
      const stompByTop = aboveEnemyCenter && topTolerance;

      // Prioridade total do stomp (sensor + fallback por posição)
      if (isFalling && (stompBySensor || stompByTop)) {
        stompLockUntil = this.time.now + 120;
        console.log('[StompDebug] stomp trigger', {
          playerX: player.x,
          playerY: player.y,
          enemyX: enemy.x,
          enemyY: enemy.y,
          velocityY: player.body.velocity.y,
          stompBySensor,
          stompByTop,
          aboveEnemyCenter,
          topTolerance
        });

        destroyEnemyOnHit(this, enemy);
        playerObj.setVelocityY(-350);
        return;
      }

      // Janela curta para evitar conflito no mesmo frame entre stomp e dano.
      if (this.time.now < stompLockUntil) return;

      console.log('[StompDebug] damage trigger', {
        playerX: player.x,
        playerY: player.y,
        enemyX: enemy.x,
        enemyY: enemy.y,
        velocityY: player.body.velocity.y
      });
      damagePlayer(this);
    });

  cursors = this.input.keyboard.createCursorKeys();

  // Tecla de ataque (X)
  keyX = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.X);

  // Hitbox do soco (fica invisível até o momento do ataque)
  attackHitbox = this.add.rectangle(-100, -100, 35, 25, 0xffff00, 0.35);
  this.physics.add.existing(attackHitbox);
  attackHitbox.body.setAllowGravity(false);
  attackHitbox.body.setImmovable(true);
  attackHitbox.body.setSize(42, 32);
  attackHitbox.body.enable = false;
  attackHitbox.setVisible(false);

  // Se a hitbox tocar um inimigo, o inimigo é destruído
  this.physics.add.overlap(attackHitbox, enemies, (hitbox, enemy) => {
    if (!hitbox.body.enable || !enemy || !enemy.active) return;
    destroyEnemyOnHit(this, enemy);
  });

  // Se fireball tocar no player, aplica dano e destrói o projétil
  this.physics.add.overlap(player, fireballs, (playerObj, fireball) => {
    if (!fireball || !fireball.active) return;
    fireball.disableBody(true, true);
    damagePlayer(this);
  });

  // Boss nasce depois que o player coleta 5 moedas
  boss = null;

  // Moedas (círculos amarelos) com física estática
  coins = this.physics.add.staticGroup();
  createCoin(this, 180, 520);
  createCoin(this, 260, 480);
  createCoin(this, 420, 520);
  createCoin(this, 560, 480);
  createCoin(this, 740, 520);

  // Coleta de moedas: some e soma +1 no score
  this.physics.add.overlap(player, coins, (playerObj, coin) => {
    if (!coin || !coin.active || !coin.body || !coin.body.enable) return;
    if (coin.collected) return;
    coin.collected = true;

    const coinX = coin.x;
    const coinY = coin.y;

    // Desabilita imediatamente para contar apenas uma vez
    if (typeof coin.disableBody === 'function') {
      coin.disableBody(true, true);
    } else {
      coin.body.enable = false;
      coin.setActive(false);
      coin.setVisible(false);
    }

    score += 1;
    scoreText.setText('Moedas: ' + score);

    // Spawn do boss apenas uma vez quando atingir 5 moedas
    if (score >= 5 && !bossSpawned) {
      spawnBoss(this, ground);
    }

    // Feedback visual simples
    playCoinCollectEffect(this, coinX, coinY);
  });

  // HUD simples para mostrar vidas
  livesText = this.add.text(20, 14, 'Vidas: ' + playerLives, {
    fontSize: '24px',
    color: '#ffffff'
  });
  livesText.setScrollFactor(0);
  livesText.setDepth(1001);

  // HUD do score de moedas
  scoreText = this.add.text(20, 44, 'Moedas: ' + score, {
    fontSize: '24px',
    color: '#ffff66'
  });
  scoreText.setScrollFactor(0);
  scoreText.setDepth(1001);

  // HUD da vida do boss
  bossText = this.add.text(20, 74, 'Boss: Locked', {
    fontSize: '24px',
    color: '#dd99ff'
  });
  bossText.setScrollFactor(0);
  bossText.setDepth(1001);

  // Fundo leve para melhorar leitura do HUD
  const hudBg = this.add.rectangle(140, 52, 250, 96, 0x000000, 0.32);
  hudBg.setOrigin(0, 0.5);
  hudBg.setScrollFactor(0);
  hudBg.setDepth(1000);

  // Setup simples da musica de fundo (loop + volume)
  if (!bgMusic) {
    bgMusic = this.sound.add('bg-music', {
      loop: true,
      volume: 0.3
    });
  }

  // Em restart de cena, se ja estiver tocando, mantem estado
  if (bgMusic.isPlaying) {
    musicStarted = true;
  }

  // Restricao de navegador: inicia so apos interacao do usuario
  const startMusicOnce = () => {
    if (musicStarted || !bgMusic) return;
    bgMusic.play();
    musicStarted = true;
  };

  this.input.keyboard.once('keydown', startMusicOnce);
  this.input.once('pointerdown', startMusicOnce);
}

function update() {
  // Mantém o foot hitbox alinhado com o jogador a cada frame
  if (footHitbox && footHitbox.body && player && player.body) {
    footHitbox.x = player.body.center.x;
    footHitbox.y = player.body.bottom + 4;
    footHitbox.body.updateFromGameObject();
  }

  if (isGameOver) {
    player.body.setVelocityX(0);
    return;
  }

  if (cursors.left.isDown) {
    player.body.setVelocityX(-200);
    facing = 'left';
    player.setFlipX(true);
  } else if (cursors.right.isDown) {
    player.body.setVelocityX(200);
    facing = 'right';
    player.setFlipX(false);
  } else {
    player.body.setVelocityX(0);
  }

  if (cursors.up.isDown && player.body.touching.down) {
    player.body.setVelocityY(-400);
  }

  // Executa ataque ao pressionar X (com cooldown)
  if (Phaser.Input.Keyboard.JustDown(keyX) && canAttack) {
    performAttack(this);
  }

  // Controle simples de animações baseado no estado atual
  const onGround = player.body.touching.down || player.body.blocked.down;
  const movingX = player.body.velocity.x !== 0;

  // Prioridade: attack > jump > run > idle
  if (isAttacking) {
    setPlayerAnimation('attack');
  } else if (!onGround) {
    setPlayerAnimation('jump');
  } else if (movingX) {
    setPlayerAnimation('run');
  } else {
    setPlayerAnimation('idle');
  }

  // Movimento automático esquerda/direita dos inimigos
  enemies.children.iterate((enemy) => {
    // Ignora inimigos já destruídos/sem body para não travar o update
    if (!enemy || !enemy.active || !enemy.body || !enemy.body.enable) return;

    // Inverte direção ao atingir os limites definidos
    if (enemy.x <= enemy.minX) {
      enemy.direction = 1;
    } else if (enemy.x >= enemy.maxX) {
      enemy.direction = -1;
    }

    enemy.body.setVelocityX(enemy.speed * enemy.direction);

    // Flip conforme direção
    enemy.setFlipX(enemy.direction === -1);

    // Animação padrão do inimigo
    if (!enemy.anims.currentAnim || enemy.anims.currentAnim.key !== 'enemy-walk') {
      enemy.anims.play('enemy-walk', true);
    }
  });

  // Movimento simples do boss (vai e volta devagar)
  if (boss && boss.active && boss.body && boss.body.enable) {
    if (boss.x <= boss.minX) {
      boss.direction = 1;
      boss.setFlipX(false);
    } else if (boss.x >= boss.maxX) {
      boss.direction = -1;
      boss.setFlipX(true);
    }

    boss.body.setVelocityX(boss.speed * boss.direction);

    if (!boss.anims.currentAnim || boss.anims.currentAnim.key !== 'boss-idle') {
      boss.anims.play('boss-idle', true);
    }

    // Disparo periódico de fireballs sem alterar o movimento do boss
    if (this.time.now - bossLastShotTime >= BOSS_SHOT_COOLDOWN) {
      spawnBossFireball(this);
      bossLastShotTime = this.time.now;
    }

    // O sprite já sincroniza com o corpo automaticamente no Arcade.
  }

  // Limpa projéteis que saíram da tela útil/mundo
  if (fireballs) {
    fireballs.children.iterate((fireball) => {
      if (!fireball || !fireball.active) return;

      const outOfWorld = fireball.x < -40 || fireball.x > WORLD_WIDTH + 40 || fireball.y > WORLD_HEIGHT + 40;
      if (outOfWorld) {
        fireball.disableBody(true, true);
      }
    });
  }

  // Spawna mais conteúdo conforme o jogador avança pelo mapa
  if (player.x > lastSpawnX) {
    spawnMoreContent(this, player.x + CONTENT_SPAWN_AHEAD);
    lastSpawnX += CONTENT_SPAWN_STEP;
  }

}

// Cria um soco curto na frente do jogador
function performAttack(scene) {
  canAttack = false;
  isAttacking = true;

  // Força animação de ataque no momento do soco
  setPlayerAnimation('attack');

  // Direção do soco: aparece na frente do player
  const offsetX = facing === 'right' ? 52 : -52;
  attackHitbox.setPosition(player.body.center.x + offsetX, player.body.center.y + 10);
  attackHitbox.setVisible(true);
  attackHitbox.body.enable = true;
  attackHitbox.body.updateFromGameObject();

  // Garante detecção imediata no mesmo frame do ataque
  scene.physics.overlap(attackHitbox, enemies, (hitbox, enemy) => {
    if (!hitbox.body.enable || !enemy || !enemy.active) return;
    destroyEnemyOnHit(scene, enemy);
  });

  // Hitbox some rapidamente
  scene.time.delayedCall(200, () => {
    attackHitbox.body.enable = false;
    attackHitbox.setVisible(false);
  });

  // Tempo de estado de ataque (visual + lógica)
  scene.time.delayedCall(220, () => {
    isAttacking = false;
  });

  // Cooldown para evitar spam
  scene.time.delayedCall(300, () => {
    canAttack = true;
  });
}

// Aplica dano no jogador com invencibilidade temporária
function damagePlayer(scene) {
  if (isInvulnerable || isGameOver) return;

  playerLives -= 1;
  livesText.setText('Vidas: ' + playerLives);

  // Feedback visual: muda cor + pisca por 1 segundo
  isInvulnerable = true;
  player.setTint(0xff6666);
  scene.tweens.add({
    targets: player,
    alpha: 0.3,
    duration: 100,
    yoyo: true,
    repeat: 5,
    onComplete: () => {
      player.alpha = 1;
      player.clearTint();
    }
  });

  if (playerLives <= 0) {
    isGameOver = true;
    scene.add.text(400, 300, 'Game Over', {
      fontSize: '48px',
      color: '#ffffff'
    }).setOrigin(0.5);

    // Reinicia a cena após um pequeno tempo
    scene.time.delayedCall(1500, () => {
      scene.scene.restart();
    });
    return;
  }

  scene.time.delayedCall(1000, () => {
    isInvulnerable = false;
  });
}

// Toca animação apenas quando necessário (evita troca/restart a cada frame)
function setPlayerAnimation(key) {
  if (!player || !player.anims) return;
  if (player.anims.currentAnim && player.anims.currentAnim.key === key) return;
  player.anims.play(key, true);
}

// Sincroniza sprite do boss com o corpo físico (alinhado ao chão)
function syncBossVisualWithBody() {
  if (!boss || !boss.body) return;

  boss.x = boss.body.center.x;
  boss.y = boss.body.bottom;
}

// Cria um projétil simples do boss em direção horizontal ao player
function spawnBossFireball(scene) {
  if (!boss || !boss.active || !boss.body || !player || !player.active || !fireballs) return;

  const startX = boss.body.center.x;
  const startY = boss.body.center.y - 18;
  const fireball = fireballs.get(startX, startY, 'fireball');
  if (!fireball) return;

  fireball.setActive(true);
  fireball.setVisible(true);
  fireball.setPosition(startX, startY);
  fireball.setDepth(20);
  fireball.body.enable = true;
  fireball.body.setAllowGravity(false);
  fireball.body.setSize(12, 12, true);

  const dirX = player.x > boss.x ? 1 : -1;
  fireball.setVelocityX(BOSS_FIREBALL_SPEED * dirX);
  fireball.setVelocityY(0);

  // Feedback visual curto de ataque sem alterar patrulha do boss
  if (boss.anims) {
    boss.anims.play('boss-attack', true);
    scene.time.delayedCall(180, () => {
      if (boss && boss.active) {
        boss.anims.play('boss-idle', true);
      }
    });
  }
}

// Cria boss quando o jogador junta moedas suficientes
function spawnBoss(scene, ground) {
  if (bossSpawned) return;
  bossSpawned = true;

  bossHealth = 5;
  bossCanTakeHit = true;

  // Boss final no lado direito do mapa (sprite)
  boss = scene.physics.add.sprite(WORLD_WIDTH - 120, 540, 'thanos', 0);
  boss.setOrigin(0.5, 1);
  boss.setScale(1.7); // maior que o player

  // Corpo físico alinhado ao sprite escalado (centralizado)
  boss.body.setSize(110, 145, true);
  boss.body.setCollideWorldBounds(true);
  boss.body.setImmovable(false);
  boss.minX = WORLD_WIDTH - 260;
  boss.maxX = WORLD_WIDTH - 80;
  boss.direction = -1;
  boss.speed = 45;
  boss.anims.play('boss-idle', true);
  bossLastShotTime = scene.time.now;

  // Boss colide com o chão
  scene.physics.add.collider(boss, ground);

  // Boss causa dano ao encostar no jogador
  scene.physics.add.collider(player, boss, () => {
    if (!boss || !boss.active) return;
    damagePlayer(scene);
  });

  // Boss só toma dano da hitbox de ataque
  scene.physics.add.overlap(attackHitbox, boss, (hitbox, bossObj) => {
    if (!hitbox.body.enable || !bossObj.active || !bossCanTakeHit) return;

    bossCanTakeHit = false;
    bossHealth -= 1;
    bossText.setText('Boss: ' + bossHealth);

    // Feedback visual simples quando o boss toma dano
    bossObj.setTint(0xc77dff);
    scene.time.delayedCall(100, () => {
      if (bossObj.active) {
        bossObj.clearTint();
      }
    });

    if (bossHealth <= 0) {
      bossObj.destroy();
      isGameOver = true;
      scene.add.text(400, 300, 'YOU WIN', {
        fontSize: '48px',
        color: '#ffffff'
      }).setOrigin(0.5);
      return;
    }

    // Evita múltiplos hits no mesmo ataque
    scene.time.delayedCall(220, () => {
      bossCanTakeHit = true;
    });
  });

  bossText.setText('Boss: ' + bossHealth);
}

// Função simples para criar um inimigo com patrulha horizontal
function createEnemy(scene, x, y, minX, maxX) {
  const enemy = scene.physics.add.sprite(x, y, 'enemy', 0);
  enemy.setOrigin(0.5, 1);
  enemy.body.setSize(34, 40, true);
  enemy.anims.play('enemy-walk', true);

  enemy.body.setCollideWorldBounds(true);
  enemy.minX = minX;
  enemy.maxX = maxX;
  enemy.speed = 80;
  enemy.direction = 1;

  enemies.add(enemy);
}

// Efeito leve ao coletar moeda (sem custo alto)
function playCoinCollectEffect(scene, x, y) {
  const sparkle = scene.add.circle(x, y, 6, 0xfff799, 0.8);
  const plusOne = scene.add.text(x, y - 8, '+1', {
    fontSize: '16px',
    color: '#ffe066'
  }).setOrigin(0.5);

  scene.tweens.add({
    targets: sparkle,
    scaleX: 2,
    scaleY: 2,
    alpha: 0,
    duration: 130,
    onComplete: () => sparkle.destroy()
  });

  scene.tweens.add({
    targets: plusOne,
    y: y - 28,
    alpha: 0,
    duration: 260,
    onComplete: () => plusOne.destroy()
  });
}

// Efeito leve ao acertar inimigo (flash + encolher)
function playEnemyHitEffect(scene, enemy, onComplete) {
  const effectTargets = enemy.visualParts && enemy.visualParts.length > 0
    ? enemy.visualParts
    : [enemy];

  effectTargets.forEach((part) => {
    if (part.setFillStyle) {
      part.setFillStyle(0xffe066);
    }
  });

  scene.tweens.add({
    targets: effectTargets,
    scaleX: 1.25,
    scaleY: 0.7,
    alpha: 0,
    duration: 120,
    onComplete: () => {
      if (onComplete) onComplete();
    }
  });
}

// Remove inimigo ao levar hit da hitbox de ataque
function destroyEnemyOnHit(scene, enemy) {
  // Evita hit duplo no mesmo inimigo durante o efeito
  if (enemy.isDying) return;
  enemy.isDying = true;

  if (enemy.body) {
    enemy.body.enable = false;
  }

  // Feedback visual rápido de impacto antes de remover
  playEnemyHitEffect(scene, enemy, () => {
    if (enemy.active) {
      enemy.destroy();
    }
  });
}

// Função simples para criar uma moeda
function createCoin(scene, x, y) {
  // Evita spawn de moedas na mesma posição
  const key = Math.round(x) + ':' + Math.round(y);
  if (coinSpawnKeys.has(key)) return;
  coinSpawnKeys.add(key);

  const coin = scene.add.circle(x, y, 10, 0xffdd33);
  scene.physics.add.existing(coin, true);

  coins.add(coin);
}

// Spawna conteúdo novo (inimigos e moedas) à frente do jogador
function spawnMoreContent(scene, xBase) {
  // Evita spawn fora da área útil no final do mundo
  if (xBase > WORLD_WIDTH - 200) return;

  const baseX = Phaser.Math.Clamp(xBase, 200, WORLD_WIDTH - 200);

  // Inimigo principal com patrulha curta
  const enemyX1 = Phaser.Math.Clamp(baseX + 40, 120, WORLD_WIDTH - 120);
  createEnemy(scene, enemyX1, 520, enemyX1 - 90, enemyX1 + 90);

  // Inimigo extra em blocos alternados (leve e simples)
  const chunk = Math.floor(baseX / CONTENT_SPAWN_STEP);
  if (chunk % 2 === 0) {
    const enemyX2 = Phaser.Math.Clamp(baseX + 220, 120, WORLD_WIDTH - 120);
    createEnemy(scene, enemyX2, 520, enemyX2 - 70, enemyX2 + 70);
  }

  // Moedas em alturas diferentes
  const coinY = [520, 480, 440, 500];
  for (let i = 0; i < coinY.length; i += 1) {
    const coinX = Phaser.Math.Clamp(baseX + 20 + (i * 70), 80, WORLD_WIDTH - 80);
    createCoin(scene, coinX, coinY[i]);
  }
}

// Cria um cenário de cidade leve, usando apenas formas
function createCityBackground(scene, sceneWidth = WORLD_WIDTH) {
  const width = sceneWidth;
  const height = WORLD_HEIGHT;
  const cityBaseY = height - 40;

  // Céu em duas faixas para dar profundidade
  const skyTop = scene.add.rectangle(width / 2, height * 0.25, width, height * 0.5, 0x1b2a49).setDepth(-30);
  const skyBottom = scene.add.rectangle(width / 2, height * 0.72, width, height * 0.56, 0x23395b).setDepth(-29);

  // Lua
  const moon = scene.add.circle(width * 0.85, height * 0.15, 28, 0xf2f2c9).setDepth(-28);

  // Camada distante de prédios (mais escura)
  for (let x = 40; x <= width + 40; x += 90) {
    const h = Phaser.Math.Between(120, 220);
    scene.add.rectangle(x, cityBaseY - h / 2, 70, h, 0x1a2238)
      .setDepth(-27)
      .setScrollFactor(1);
  }

  // Camada média de prédios (mais clara)
  for (let x = 25; x <= width + 25; x += 80) {
    const h = Phaser.Math.Between(90, 180);
    scene.add.rectangle(x, cityBaseY - h / 2, 52, h, 0x2f3e63)
      .setDepth(-26)
      .setScrollFactor(1);
  }

  // Mantém referências para evitar aviso de variáveis não usadas
  skyTop.alpha = 1;
  skyBottom.alpha = 1;
  moon.alpha = 1;
}
